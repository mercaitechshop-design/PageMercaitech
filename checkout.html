<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Mercaitech</title>
  <link rel="icon" type="image/png" href="assets/logo-mark.png">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .checkout-page { padding: calc(var(--nav-h) + var(--space-8)) 0 var(--space-10); min-height: 100vh; }
    .checkout-grid { display: grid; grid-template-columns: 1fr 400px; gap: var(--space-7); align-items: start; }
    .checkout-panel { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-6); }
    .checkout-panel__title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: var(--space-5); padding-bottom: var(--space-4); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .checkout-panel__title svg { width: 20px; height: 20px; color: var(--mt-blue-400); }
    .form-group { display: flex; flex-direction: column; gap: var(--space-2); margin-bottom: var(--space-4); }
    .form-group--row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
    .form-label { font-size: var(--fs-body-sm); font-weight: 500; color: var(--fg-muted); }
    .form-input, .form-select {
      background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 12px 14px; color: var(--fg); font-family: inherit; font-size: var(--fs-body-sm); outline: none;
      transition: border-color var(--dur-base) var(--ease-standard);
    }
    .form-input:focus, .form-select:focus { border-color: var(--mt-blue-400); box-shadow: 0 0 0 3px rgba(0,102,255,.15); }
    .form-input::placeholder { color: var(--fg-subtle); }
    .form-select { -webkit-appearance: none; appearance: none; cursor: pointer; }
    .payment-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); margin-bottom: var(--space-5); }
    .payment-method { padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; text-align: center; transition: all var(--dur-base) var(--ease-standard); }
    .payment-method.active { border-color: var(--mt-blue-400); background: rgba(0,102,255,.08); }
    .payment-method svg { width: 28px; height: 28px; margin: 0 auto 6px; color: var(--fg-muted); }
    .payment-method.active svg { color: var(--mt-blue-400); }
    .payment-method-label { font-size: 11px; font-weight: 600; color: var(--fg-subtle); }
    .payment-method.active .payment-method-label { color: var(--mt-blue-300); }
    .order-summary-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
    .order-summary-item:last-child { border-bottom: 0; }
    .order-summary-img { width: 56px; height: 56px; border-radius: var(--radius-sm); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .order-summary-img svg { width: 24px; height: 24px; color: rgba(255,255,255,.8); }
    .order-summary-name { font-size: var(--fs-body-sm); font-weight: 600; flex: 1; }
    .order-summary-meta { font-size: 11px; color: var(--fg-subtle); margin-top: 2px; }
    .order-summary-price { font-family: var(--font-display); font-weight: 700; font-size: 15px; white-space: nowrap; }
    .order-totals { margin-top: var(--space-4); }
    .order-totals__row { display: flex; justify-content: space-between; padding: 6px 0; font-size: var(--fs-body-sm); color: var(--fg-muted); }
    .order-totals__final { padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--border); font-size: 18px; color: var(--fg); font-weight: 700; }
    .order-totals__final span:last-child { font-family: var(--font-display); font-size: 22px; }
    .secure-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--fg-subtle); margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--border); }
    .secure-badge svg { width: 16px; height: 16px; color: var(--mt-green-400); }
    .coupon-row { display: flex; gap: 8px; margin-bottom: var(--space-5); }
    .coupon-row .form-input { flex: 1; margin: 0; }
    @media (max-width: 768px) {
      .checkout-grid { grid-template-columns: 1fr; }
      .form-group--row { grid-template-columns: 1fr; }
      .payment-methods { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="navbar__brand">
      <img src="assets/logo.png" alt="Mercaitech" class="navbar__logo">
      <span class="navbar__wordmark">MERCAI<span>TECH</span></span>
    </a>
    <div style="flex:1"></div>
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-subtle)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--mt-green-400)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      Pago 100% seguro
    </div>
  </div>
</nav>

<main class="checkout-page">
  <div class="container">
    <!-- Breadcrumb -->
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg-subtle);margin-bottom:var(--space-6)">
      <a href="index.html" style="color:var(--mt-blue-300);display:flex;align-items:center;gap:4px">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="m12 19-7-7 7-7M19 12H5"/></svg>
        Volver a la tienda
      </a>
      <span>›</span><span>Carrito</span><span>›</span><span style="color:var(--fg)">Checkout</span>
    </div>

    <div class="checkout-grid">
      <!-- LEFT: Form -->
      <div style="display:flex;flex-direction:column;gap:var(--space-5)">

        <!-- Contact -->
        <div class="checkout-panel">
          <h2 class="checkout-panel__title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Información de contacto
          </h2>
          <div class="form-group--row">
            <div class="form-group">
              <label class="form-label" for="nombre">Nombre *</label>
              <input type="text" class="form-input" id="nombre" placeholder="Juan" required autocomplete="given-name">
            </div>
            <div class="form-group">
              <label class="form-label" for="apellido">Apellido *</label>
              <input type="text" class="form-input" id="apellido" placeholder="García" required autocomplete="family-name">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico *</label>
            <input type="email" class="form-input" id="email" placeholder="tu@correo.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="telefono">Teléfono</label>
            <input type="tel" class="form-input" id="telefono" placeholder="+57 300 000 0000" autocomplete="tel">
          </div>
        </div>

        <!-- Shipping -->
        <div class="checkout-panel">
          <h2 class="checkout-panel__title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="13" x="4" y="7" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            Dirección de envío
          </h2>
          <div class="form-group">
            <label class="form-label" for="direccion">Dirección *</label>
            <input type="text" class="form-input" id="direccion" placeholder="Calle 80 # 10-25, Apt 302" required autocomplete="street-address">
          </div>
          <div class="form-group--row">
            <div class="form-group">
              <label class="form-label" for="ciudad">Ciudad *</label>
              <input type="text" class="form-input" id="ciudad" placeholder="Bogotá" required autocomplete="address-level2">
            </div>
            <div class="form-group">
              <label class="form-label" for="departamento">Departamento</label>
              <input type="text" class="form-input" id="departamento" placeholder="Cundinamarca" autocomplete="address-level1">
            </div>
          </div>
          <div class="form-group--row">
            <div class="form-group">
              <label class="form-label" for="pais">País *</label>
              <select class="form-select" id="pais" autocomplete="country-name">
                <option value="Colombia" selected>Colombia</option>
                <option value="México">México</option>
                <option value="Argentina">Argentina</option>
                <option value="Chile">Chile</option>
                <option value="Perú">Perú</option>
                <option value="Venezuela">Venezuela</option>
                <option value="Ecuador">Ecuador</option>
                <option value="Bolivia">Bolivia</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="cp">Código postal</label>
              <input type="text" class="form-input" id="cp" placeholder="110111" autocomplete="postal-code">
            </div>
          </div>
        </div>

        <!-- Payment -->
        <div class="checkout-panel">
          <h2 class="checkout-panel__title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
            Método de pago
          </h2>
          <div class="payment-methods" id="payment-methods">
            <div class="payment-method active" data-method="card">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
              <div class="payment-method-label">Tarjeta</div>
            </div>
            <div class="payment-method" data-method="pse">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M6 9h4M6 13h8"/></svg>
              <div class="payment-method-label">PSE / Banco</div>
            </div>
            <div class="payment-method" data-method="efectivo">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              <div class="payment-method-label">Efectivo</div>
            </div>
          </div>

          <!-- Card fields -->
          <div id="card-fields">
            <div class="form-group">
              <label class="form-label" for="card-number">Número de tarjeta *</label>
              <input type="text" class="form-input" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19" autocomplete="cc-number">
            </div>
            <div class="form-group--row">
              <div class="form-group">
                <label class="form-label" for="card-exp">Vencimiento *</label>
                <input type="text" class="form-input" id="card-exp" placeholder="MM / AA" maxlength="7" autocomplete="cc-exp">
              </div>
              <div class="form-group">
                <label class="form-label" for="card-cvv">CVV *</label>
                <input type="text" class="form-input" id="card-cvv" placeholder="123" maxlength="4" autocomplete="cc-csc">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="card-name">Nombre en la tarjeta *</label>
              <input type="text" class="form-input" id="card-name" placeholder="JUAN GARCIA" autocomplete="cc-name">
            </div>
          </div>
        </div>

      </div>

      <!-- RIGHT: Order summary -->
      <div style="position:sticky;top:calc(var(--nav-h) + 24px)">
        <div class="checkout-panel">
          <h2 class="checkout-panel__title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            Tu pedido
          </h2>
          <div id="checkout-items">
            <div style="text-align:center;padding:24px 0;color:var(--fg-subtle);font-size:13px">
              El carrito está vacío.<br><a href="index.html" style="color:var(--mt-blue-300)">Volver a la tienda →</a>
            </div>
          </div>

          <!-- Coupon -->
          <div style="margin-top:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--border)">
            <label class="form-label" style="margin-bottom:8px;display:block">Cupón de descuento</label>
            <div class="coupon-row">
              <input type="text" class="form-input" id="coupon-input" placeholder="Ej: BIENVENIDO10" style="text-transform:uppercase">
              <button class="btn btn--secondary btn--sm" id="coupon-btn" style="white-space:nowrap;flex-shrink:0">Aplicar</button>
            </div>
            <div id="coupon-msg" style="font-size:12px;margin-top:4px"></div>
          </div>

          <!-- Totals -->
          <div class="order-totals" id="checkout-totals"></div>

          <button class="btn btn--primary btn--lg btn--full" id="place-order-btn" style="margin-top:var(--space-5)" disabled>
            CONFIRMAR PEDIDO
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>

          <div class="secure-badge">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
            Pago seguro con cifrado SSL de 256 bits
          </div>
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;opacity:.5">
            <span style="font-size:10px;font-family:var(--font-mono);color:var(--fg-subtle)">VISA · MASTERCARD · PSE · NEQUI · DAVIPLATA</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script>
'use strict';

const $ = id => document.getElementById(id);

function showToast(message, type = 'success') {
  const icons = {
    success: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    error:   '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>'
  };
  const container = $('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast--${type}`;
  el.innerHTML = `${icons[type]}<span>${message}</span>`;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show'); el.classList.add('hide');
    el.addEventListener('transitionend', () => el.remove(), { once: true });
  }, 3000);
}

// Render checkout items
function renderCheckoutSummary() {
  const itemsEl = $('checkout-items');
  const totalsEl = $('checkout-totals');
  const orderBtn = $('place-order-btn');

  if (window.cart.isEmpty) {
    itemsEl.innerHTML = '<div style="text-align:center;padding:24px 0;color:var(--fg-subtle);font-size:13px">El carrito está vacío.<br><a href="index.html" style="color:var(--mt-blue-300)">Volver a la tienda →</a></div>';
    totalsEl.innerHTML = '';
    orderBtn.disabled = true;
    return;
  }

  itemsEl.innerHTML = window.cart.items.map(item => `
    <div class="order-summary-item">
      <div class="order-summary-img" style="background:${item.bg}">${getIcon(item.icon)}</div>
      <div style="flex:1;min-width:0">
        <div class="order-summary-name">${item.title}</div>
        <div class="order-summary-meta">${item.categoryLabel} · Cant. ${item.qty}</div>
      </div>
      <div class="order-summary-price">${window.cart.formatPrice(item.price * item.qty)}</div>
    </div>
  `).join('');

  const sub = window.cart.subtotal;
  totalsEl.innerHTML = `
    <div class="order-totals__row"><span>Subtotal</span><span>${window.cart.formatPrice(sub)}</span></div>
    <div class="order-totals__row"><span>Envío</span><span style="color:var(--mt-cyan-400)">Gratis</span></div>
    <div class="order-totals__row order-totals__final"><span>Total</span><span>${window.cart.formatPrice(sub)}</span></div>
  `;
  orderBtn.disabled = false;
}

// Payment method toggle
document.querySelectorAll('.payment-method').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.payment-method').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $('card-fields').style.display = btn.dataset.method === 'card' ? 'block' : 'none';
  });
});

// Card number formatting
$('card-number').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'').substring(0,16);
  e.target.value = v.match(/.{1,4}/g)?.join(' ') || v;
});

// Expiry formatting
$('card-exp').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'').substring(0,4);
  if (v.length >= 3) v = v.substring(0,2) + ' / ' + v.substring(2);
  e.target.value = v;
});

// Coupon
$('coupon-btn').addEventListener('click', () => {
  const code = $('coupon-input').value.trim().toUpperCase();
  if (!code) return;
  const valid = ['BIENVENIDO10','TECH2026','ENVIOGRATIS'];
  const msg = $('coupon-msg');
  if (valid.includes(code)) {
    msg.style.color = 'var(--mt-green-400)';
    msg.textContent = '✓ Cupón aplicado correctamente';
    showToast('Cupón aplicado', 'success');
  } else {
    msg.style.color = '#FF5470';
    msg.textContent = '✗ Cupón no válido o expirado';
  }
});

// Place order
$('place-order-btn').addEventListener('click', async () => {
  const btn = $('place-order-btn');
  const nombre = $('nombre').value.trim();
  const apellido = $('apellido').value.trim();
  const email = $('email').value.trim();
  const direccion = $('direccion').value.trim();
  const ciudad = $('ciudad').value.trim();

  if (!nombre || !apellido || !email || !direccion || !ciudad) {
    showToast('Por favor completa todos los campos obligatorios.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'PROCESANDO…';

  const body = {
    items: window.cart.items.map(i => ({ id: i.id, qty: i.qty })),
    cliente: { nombre: `${nombre} ${apellido}`, email, telefono: $('telefono').value },
    envio: { direccion, ciudad, pais: $('pais').value, codigo_postal: $('cp').value }
  };

  try {
    const res = await fetch('api/orders.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (data.success) {
      window.cart.clear();
      showToast('¡Pedido confirmado! ' + data.numero_orden, 'success');
      setTimeout(() => {
        document.querySelector('main').innerHTML = `
          <div style="text-align:center;padding:var(--space-10) var(--space-4);max-width:560px;margin:0 auto">
            <div style="width:80px;height:80px;border-radius:50%;background:rgba(16,201,138,.15);border:1px solid rgba(16,201,138,.4);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-6);">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="var(--mt-green-400)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:36px;height:36px"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <h1 style="font-family:var(--font-display);font-weight:800;font-size:32px;letter-spacing:-0.02em;margin-bottom:12px">¡Pedido confirmado!</h1>
            <p style="color:var(--fg-muted);font-size:16px;line-height:1.6;margin-bottom:var(--space-6)">
              Tu número de orden es <strong style="color:var(--mt-cyan-400);font-family:var(--font-mono)">${data.numero_orden}</strong>.<br>
              Recibirás un correo en <strong>${email}</strong> con los detalles de tu pedido.
            </p>
            <a href="index.html" class="btn btn--primary btn--lg">SEGUIR COMPRANDO</a>
          </div>
        `;
      }, 1500);
    } else {
      throw new Error(data.error || 'Error al procesar');
    }
  } catch {
    // Demo mode fallback
    window.cart.clear();
    const demoOrder = 'MT-' + Math.random().toString(36).substring(2,8).toUpperCase();
    showToast('¡Pedido confirmado! ' + demoOrder, 'success');
    setTimeout(() => {
      document.querySelector('main').innerHTML = `
        <div style="text-align:center;padding:var(--space-10) var(--space-4);max-width:560px;margin:0 auto">
          <div style="width:80px;height:80px;border-radius:50%;background:rgba(16,201,138,.15);border:1px solid rgba(16,201,138,.4);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-6);">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="var(--mt-green-400)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:36px;height:36px"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <h1 style="font-family:var(--font-display);font-weight:800;font-size:32px;letter-spacing:-0.02em;margin-bottom:12px">¡Pedido confirmado!</h1>
          <p style="color:var(--fg-muted);font-size:16px;line-height:1.6;margin-bottom:var(--space-6)">
            Tu número de orden es <strong style="color:var(--mt-cyan-400);font-family:var(--font-mono)">${demoOrder}</strong>.<br>
            Recibirás un correo con los detalles de tu pedido.
          </p>
          <a href="index.html" class="btn btn--primary btn--lg">SEGUIR COMPRANDO</a>
        </div>
      `;
    }, 1500);
  }
});

// Navbar scroll
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

// Init
document.addEventListener('DOMContentLoaded', () => {
  renderCheckoutSummary();

  // Pre-fill contact form from auth session
  const user = (typeof MercaitechAuth !== 'undefined') ? MercaitechAuth.getUser() : null;
  if (user) {
    const parts = (user.nombre || '').split(' ');
    const firstName = parts[0] || '';
    const lastName  = parts.slice(1).join(' ') || '';
    const nameEl  = document.getElementById('nombre');
    const lastEl  = document.getElementById('apellido');
    const emailEl = document.getElementById('email');
    if (nameEl  && !nameEl.value)  nameEl.value  = firstName;
    if (lastEl  && !lastEl.value)  lastEl.value  = lastName;
    if (emailEl && !emailEl.value) emailEl.value = user.email || '';

    // Show "Comprando como" badge in the navbar area
    const nav = document.querySelector('.navbar__inner');
    if (nav) {
      const badge = document.createElement('div');
      badge.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg-subtle);margin-left:auto;margin-right:12px';
      badge.innerHTML = `
        <span style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--mt-blue-500),var(--mt-cyan-400));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff">${(user.nombre||'?')[0].toUpperCase()}</span>
        <span>${user.nombre}</span>
      `;
      const secureEl = nav.querySelector('div[style*="Pago"]');
      if (secureEl) nav.insertBefore(badge, secureEl);
    }
  }
});
</script>
</body>
</html>
