<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Deseos — Mercaitech</title>
  <link rel="icon" type="image/png" href="assets/logo-mark.png">
  <!-- Preload crítico -->
  <link rel="preload" href="assets/fonts/Inter_18pt-Black.ttf" as="font" type="font/truetype" crossorigin>
  <link rel="preload" href="assets/css/tokens.css?v=3" as="style">
  <link rel="preload" href="assets/css/styles.css?v=4" as="style">
  <link rel="dns-prefetch" href="//api.mercadopago.com">
  <link rel="stylesheet" href="assets/css/tokens.css?v=3">
  <link rel="stylesheet" href="assets/css/styles.css?v=4">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="navbar__brand">
      <img src="assets/logo.png" alt="Mercaitech" class="navbar__logo">
    </a>
    <a href="index.html" class="btn btn--secondary btn--sm" style="margin-left:-4px;flex-shrink:0">← Volver a la tienda</a>
    <div style="flex:1"></div>
    <div class="navbar__actions">
      <button class="icon-btn" id="account-btn" aria-label="Mi cuenta">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="icon-btn" id="cart-btn" aria-label="Carrito" style="position:relative">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </button>
    </div>
  </div>
</nav>

<main class="account-page">
  <div class="container">
    <div class="account-layout">
      <aside class="account-sidebar">
        <div class="account-sidebar__header">
          <div class="account-sidebar__avatar" id="sidebar-avatar">?</div>
          <div class="account-sidebar__name" id="sidebar-name">—</div>
          <div class="account-sidebar__email" id="sidebar-email"></div>
        </div>
        <nav class="account-sidebar__nav">
          <a href="perfil.html" class="account-nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Mi perfil
          </a>
          <a href="pedidos.html" class="account-nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            Mis pedidos
          </a>
          <a href="favoritos.html" class="account-nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            Lista de deseos
          </a>
          <div style="height:1px;background:var(--border);margin:8px 0"></div>
          <button class="account-nav-item account-nav-item--danger" onclick="MercaitechAuth.logout()" style="width:100%;text-align:left">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            Cerrar sesión
          </button>
        </nav>
      </aside>

      <div class="account-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-5);padding-bottom:var(--space-4);border-bottom:1px solid var(--border)">
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.02em">Lista de deseos</h1>
          <span id="wish-count" style="font-size:13px;color:var(--fg-subtle)"></span>
        </div>
        <div id="wish-container"></div>
      </div>
    </div>
  </div>
</main>

<!-- Cart drawer -->
<div class="cart-scrim" id="cart-scrim"></div>
<aside class="cart-drawer" id="cart-drawer" role="dialog" aria-label="Carrito de compras" aria-modal="true">
  <header class="cart-drawer__head">
    <h2 class="cart-drawer__title">Tu carrito <span class="text-subtle" id="cart-count-label">(0)</span></h2>
    <button class="icon-btn" id="close-cart-btn" aria-label="Cerrar carrito">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </header>
  <div class="cart-drawer__items" id="cart-items"></div>
  <footer class="cart-drawer__foot" id="cart-footer">
    <div class="cart-totals" id="cart-totals"></div>
    <button class="btn btn--primary btn--lg btn--full" id="checkout-btn" disabled>
      FINALIZAR COMPRA
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
  </footer>
</aside>

<div class="toast-container" id="toast-container"></div>

<script src="assets/js/products.js?v=10"></script>
<script src="assets/js/cart.js?v=12"></script>
<script src="assets/js/auth.js?v=11"></script>
<script>
'use strict';
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

function initials(n){return(n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join('');}

const COP = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);

function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast toast--' + (type||'success');
  el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg><span>${msg}</span>`;
  c.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); el.classList.add('hide'); el.addEventListener('transitionend', () => el.remove(), {once:true}); }, 3000);
}

function getWishlistKey() {
  try { const u = JSON.parse(localStorage.getItem('mt_user')||'null'); return u?.id ? 'mt_wishlist_u'+u.id : 'mt_wishlist_guest'; }
  catch { return 'mt_wishlist_guest'; }
}
function getWishlist() { try { return JSON.parse(localStorage.getItem(getWishlistKey()) || '[]'); } catch { return []; } }
function saveWishlist(list) { localStorage.setItem(getWishlistKey(), JSON.stringify(list)); }

function removeFromWishlist(id) {
  const list = getWishlist().filter(i => i.id !== id);
  saveWishlist(list);
  renderWishlist(list);
  showToast('Producto eliminado de tu lista');
}

// ── Cart UI ────────────────────────────────────────────────────────────────
function updateBadge() {
  const count = window.cart.count;
  const badge = document.getElementById('cart-badge');
  const label = document.getElementById('cart-count-label');
  if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
  if (label) label.textContent = '(' + count + ')';
}

function renderCartUI() {
  const items    = document.getElementById('cart-items');
  const totals   = document.getElementById('cart-totals');
  const checkout = document.getElementById('checkout-btn');
  updateBadge();
  if (window.cart.isEmpty) {
    items.innerHTML = '<div class="cart-empty"><div class="cart-empty__icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg></div><p class="cart-empty__title">Tu carrito está vacío</p><p class="cart-empty__sub">Descubre lo que tenemos para ti</p><a href="productos.html" class="btn btn--primary btn--sm"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explorar productos</a></div>';
    totals.innerHTML = ''; checkout.disabled = true; return;
  }
  items.innerHTML = window.cart.items.map(item => {
    const full = (window.PRODUCTS||[]).find(p => p.id === item.id);
    const imageUrl = full?.image_url || item.image_url;
    const imgContent = imageUrl ? `<img src="${imageUrl}" alt="${item.title}">` : (typeof getIcon==='function'?getIcon(item.icon):'');
    const imgBg = imageUrl ? 'background:#111827' : `background:${item.bg||'#0B1124'}`;
    const atMax = isFinite(MercaitechCart.maxQty(item.stock)) && item.qty >= MercaitechCart.maxQty(item.stock);
    return `<div class="cart-line" data-pid="${item.id}">
      <div class="cart-line__img" style="${imgBg};cursor:pointer" data-action="open">${imgContent}</div>
      <div class="cart-line__info">
        <div class="cart-line__name" style="cursor:pointer" data-action="open">${item.title}</div>
        <div class="cart-line__meta">${item.categoryLabel}</div>
        <div class="cart-line__bottom">
          <div class="cart-qty">
            <button class="cart-qty__btn" data-action="dec" aria-label="Reducir">−</button>
            <span class="cart-qty__val">${item.qty}</span>
            <button class="cart-qty__btn" data-action="inc" aria-label="Aumentar"${atMax?' disabled style="opacity:.4;cursor:not-allowed"':''}>+</button>
          </div>
          <div class="cart-line__price">${COP(item.price*item.qty)}</div>
        </div>
      </div>
      <button class="icon-btn" data-action="remove" aria-label="Eliminar" style="flex-shrink:0">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>`;
  }).join('');
  items.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const line = el.closest('[data-pid]');
      const id = parseInt(line?.dataset.pid);
      if (!id) return;
      const action = el.dataset.action;
      if (action === 'open') { closeCart(); openPdp(id); }
      else if (action === 'remove') { window.cart.remove(id); renderCartUI(); }
      else if (action === 'dec') { const cur = window.cart.items.find(i=>i.id===id)?.qty||1; window.cart.setQty(id, cur-1); renderCartUI(); }
      else if (action === 'inc') { const cur = window.cart.items.find(i=>i.id===id)?.qty||1; window.cart.setQty(id, cur+1); renderCartUI(); }
    });
  });
  const sub = window.cart.subtotal;
  totals.innerHTML = `
    <div class="cart-totals__row"><span>Subtotal</span><span>${COP(sub)}</span></div>
    <div class="cart-totals__row" style="font-size:11px;opacity:.6"><span>IVA incluido (19%)</span><span>${COP(Math.round(sub*.19/1.19))}</span></div>
    <div class="cart-totals__row"><span>Envío</span><span class="text-cyan">Gratis</span></div>
    <div class="cart-totals__row cart-totals__row--total"><span>Total</span><span>${COP(sub)}</span></div>`;
  checkout.disabled = false;
}

window.cartRemove  = id      => { window.cart.remove(id);       renderCartUI(); };
window.cartSetQty  = (id,qty)=> { window.cart.setQty(id, qty);  renderCartUI(); };

function openCart() {
  renderCartUI();
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-scrim').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-scrim').classList.remove('open');
  document.body.style.overflow = '';
}

function addToCartFromWish(id) {
  const p = (window.PRODUCTS||[]).find(p => p.id === id);
  if (!p) return;
  window.cart.add(p);
  renderCartUI();
  openCart();
}

function renderWishlist(list) {
  const cont = document.getElementById('wish-container');
  const count = document.getElementById('wish-count');
  count.textContent = list.length > 0 ? `${list.length} producto${list.length !== 1 ? 's' : ''}` : '';

  if (list.length === 0) {
    cont.innerHTML = `
      <div class="account-empty">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        <div class="account-empty__title">Tu lista de deseos está vacía</div>
        <p class="account-empty__sub">Guarda productos que te gusten haciendo click en el corazón ♡ en cada producto.</p>
        <a href="productos.html" class="btn btn--primary">EXPLORAR PRODUCTOS</a>
      </div>`;
    return;
  }

  cont.innerHTML = `<div class="wish-grid">${list.map(item => {
    // Wishlist items are slim (image stripped). Look up full product for cover image.
    const full = (window.PRODUCTS||[]).find(p => p.id === item.id);
    const imageUrl = full?.image_url || item.image_url;
    const mediaBg = imageUrl ? 'background:#111827' : 'background:' + (item.bg || '#0B1124');
    const mediaInner = imageUrl
      ? `<img src="${imageUrl}" style="width:100%;height:100%;object-fit:cover" alt="${item.title}">`
      : `<div class="product-card__icon">${typeof getIcon === 'function' ? getIcon(item.icon) : ''}</div>`;
    return `
    <div class="product-card" style="cursor:pointer" onclick="openWishProduct(${item.id})">
      <div class="product-card__media" style="${mediaBg}">
        <div class="product-card__media-inner">${mediaInner}</div>
        ${item.badge ? `<span class="product-card__badge badge--${item.badge.kind}">${item.badge.label}</span>` : ''}
      </div>
      <div class="product-card__body">
        <span class="product-card__cat">${item.categoryLabel}</span>
        <div class="product-card__title">${item.title}</div>
        <div class="product-card__row">
          <div class="product-card__prices">
            <span class="price-new">${COP(item.price)}</span>
            ${item.oldPrice ? `<span class="price-old">${COP(item.oldPrice)}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn--primary btn--sm" style="flex:1" onclick="event.stopPropagation();addToCartFromWish(${item.id})">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            Añadir
          </button>
          <button class="icon-btn icon-btn--danger" onclick="event.stopPropagation();removeFromWishlist(${item.id})" aria-label="Eliminar de favoritos" title="Eliminar de favoritos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openWishProduct(id) { openPdp(id); }

// ── PDP ────────────────────────────────────────────────────────────────────
function buildVideoPlayer(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  const vi = url.match(/vimeo\.com\/(\d+)/);
  if (yt) return `<iframe src="https://www.youtube.com/embed/${yt[1]}?autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen style="position:absolute;inset:0;border-radius:inherit"></iframe>`;
  if (vi) return `<iframe src="https://player.vimeo.com/video/${vi[1]}?autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen style="position:absolute;inset:0;border-radius:inherit"></iframe>`;
  return `<video src="${url}" controls autoplay style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit"></video>`;
}

function buildVideoThumb(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  const overlay = `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:rgba(0,0,0,.32)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,.95)" style="width:26px;height:26px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7))"><polygon points="5 3 19 12 5 21 5 3"/></svg><span style="font-size:9px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.06em;text-transform:uppercase">Video</span></div>`;
  if (yt) return `<div class="pdp-thumb" data-video="${url}" style="position:relative;background:#111;overflow:hidden;border-color:rgba(31,214,255,.35)" tabindex="0" title="Ver video"><img src="https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" alt="Video" loading="lazy">${overlay}</div>`;
  return `<div class="pdp-thumb" data-video="${url}" style="position:relative;background:#111;overflow:hidden;border-color:rgba(31,214,255,.35)" tabindex="0" title="Ver video"><video src="${url}#t=0.5" muted preload="metadata" playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none"></video>${overlay}</div>`;
}

let _pdpQty = 1;

function openPdp(id) {
  const p = (window.PRODUCTS||[]).find(x => x.id === id)
         || getWishlist().find(x => x.id === id)
         || (window.cart?.items||[]).find(x => x.id === id);
  if (!p) return;
  _pdpQty = 1;
  const oos = window.isOutOfStock ? window.isOutOfStock(p) : false;
  const _imgs = Array.isArray(p.images) && p.images.length > 0 ? p.images : null;
  const _vids = Array.isArray(p.video_urls) && p.video_urls.length > 0 ? p.video_urls : (p.video_url ? [p.video_url] : []);
  const _vid = _vids[0] || null;
  const _mainSrc = _imgs ? _imgs[0].url : null;
  const _vidThumbs = _vids.map(v => buildVideoThumb(v)).join('');
  const bg = p.bg || '#0B1124';
  const icon = typeof getIcon === 'function' ? getIcon(p.icon) : '';

  document.getElementById('pdp-content').innerHTML = `
    <div class="pdp-grid">
      <div class="pdp-gallery">
        <div class="pdp-gallery__main" id="pdp-main-media" style="${_mainSrc ? 'background:#111827' : _vid && !_mainSrc ? 'background:#000' : 'background:'+bg}">
          ${_mainSrc || (_vid && !_mainSrc) ? '' : '<div class="pdp-gallery__glow"></div>'}
          ${_vid && !_mainSrc ? buildVideoPlayer(_vid)
            : _mainSrc ? `<img id="pdp-main-img" src="${_mainSrc}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:inherit" alt="${p.title}">`
            : `<div class="pdp-gallery__icon">${icon}</div>`}
          ${p.badge ? `<span class="product-card__badge badge--${p.badge.kind}" style="z-index:2;position:absolute;top:12px;left:12px">${p.badge.label}</span>` : ''}
        </div>
        <div class="pdp-gallery__thumbs">
          ${_imgs
            ? _imgs.map((img,i) => `<div class="pdp-thumb ${i===0?'active':''}" data-img="${img.url}" style="background:#111827;overflow:hidden" tabindex="0"><img src="${img.url}" style="width:100%;height:100%;object-fit:cover" alt="${img.alt||p.title}"></div>`).join('') + _vidThumbs
            : _vid ? _vidThumbs
              : [0,1,2,3].map(i => `<div class="pdp-thumb ${i===0?'active':''}" style="background:${bg}" tabindex="0"><div style="width:32%;height:32%;color:rgba(255,255,255,.55)">${icon}</div></div>`).join('')}
        </div>
      </div>
      <div class="pdp-info">
        <span class="overline text-cyan">${p.categoryLabel||''}</span>
        <h2 class="pdp-info__title">${p.title}</h2>
        <div class="pdp-info__rating">
          <span class="pdp-info__rating-stars">★★★★${(p.rating||0)>=4.8?'★':'½'}</span>
          <span>${p.rating||0} · ${(p.reviews||0).toLocaleString('es')} reseñas</span>
        </div>
        <div class="pdp-info__prices">
          <span class="pdp-price-main">${COP(p.price)}</span>
          ${p.oldPrice ? `<span class="price-old">${COP(p.oldPrice)}</span>` : ''}
          ${p.oldPrice ? `<span class="pdp-save">Ahorras ${COP(p.oldPrice - p.price)}</span>` : ''}
        </div>
        ${oos ? `<div class="pdp-stock pdp-stock--oos"><span class="stock-dot stock-dot--oos"></span>Sin stock</div>`
               : `<div class="pdp-stock"><span class="stock-dot"></span>En stock · Envío en 24–48h</div>`}
        <p style="color:var(--fg-muted);font-size:14px;line-height:1.6">${p.description||''}</p>
        <div class="pdp-specs">${Object.entries(p.specs||{}).map(([k,v]) => `<div class="pdp-spec"><span class="pdp-spec-label">${k}</span><span class="pdp-spec-value">${v}</span></div>`).join('')}</div>
        ${!oos ? `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="pdp-qty">
            <button class="pdp-qty__btn" id="pdp-minus"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg></button>
            <span class="pdp-qty__val" id="pdp-qty-val">1</span>
            <button class="pdp-qty__btn" id="pdp-plus"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
          </div>
          <span style="font-size:12px;color:var(--fg-subtle)">Stock: ${typeof p.stock==='boolean'?'Disponible':p.stock+' unidades'}</span>
        </div>` : ''}
        <div class="pdp-actions">
          <button class="btn btn--primary btn--lg" id="pdp-add-btn" ${oos?'disabled style="opacity:.45;cursor:not-allowed"':''}>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            ${oos ? 'SIN STOCK' : 'AÑADIR AL CARRITO'}
          </button>
          <button class="btn btn--secondary btn--lg btn--icon" id="pdp-wish-btn" aria-label="Lista de deseos" title="Lista de deseos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </button>
        </div>
        <div class="pdp-trust">
          <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Compra segura</div>
          <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="13" x="4" y="7" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>Envío rápido</div>
          <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>30 días devolución</div>
        </div>
      </div>
    </div>`;

  document.getElementById('pdp-minus')?.addEventListener('click', () => {
    if (_pdpQty > 1) { _pdpQty--; document.getElementById('pdp-qty-val').textContent = _pdpQty; }
  });
  document.getElementById('pdp-plus')?.addEventListener('click', () => {
    _pdpQty++; document.getElementById('pdp-qty-val').textContent = _pdpQty;
  });
  document.getElementById('pdp-add-btn').addEventListener('click', () => {
    if (oos) return;
    for (let i = 0; i < _pdpQty; i++) window.cart.add(p);
    closePdp();
    openCart();
  });

  // Wishlist heart
  const wishBtn = document.getElementById('pdp-wish-btn');
  if (wishBtn) {
    const syncWish = () => {
      const wished = getWishlist().some(i => i.id === p.id);
      wishBtn.style.color = wished ? '#FF5470' : '';
      wishBtn.style.borderColor = wished ? 'rgba(255,84,112,.5)' : '';
      wishBtn.querySelector('svg').style.fill = wished ? '#FF5470' : 'none';
      wishBtn.title = wished ? 'En tu lista de deseos' : 'Añadir a lista de deseos';
    };
    syncWish();
    wishBtn.addEventListener('click', () => {
      const list = getWishlist();
      const idx  = list.findIndex(i => i.id === p.id);
      if (idx >= 0) { list.splice(idx, 1); showToast('Eliminado de favoritos'); }
      else {
        const { image_url, images, video_url, video_urls, ...slim } = p;
        list.push(slim);
        showToast('Añadido a favoritos ♥');
      }
      try { saveWishlist(list); } catch(e) { showToast('Error al guardar favoritos'); return; }
      syncWish();
      renderWishlist(getWishlist());
    });
  }

  document.getElementById('pdp-content').querySelectorAll('.pdp-thumb').forEach(t => {
    t.addEventListener('click', () => {
      document.getElementById('pdp-content').querySelectorAll('.pdp-thumb').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const mm = document.getElementById('pdp-main-media');
      if (mm) {
        mm.querySelectorAll('video').forEach(v => { try { v.pause(); v.src=''; } catch(e){} });
        mm.querySelectorAll('iframe').forEach(f => { try { f.src=''; } catch(e){} });
        if (t.dataset.video) { mm.style.background='#000'; mm.innerHTML=buildVideoPlayer(t.dataset.video); }
        else if (t.dataset.img) { mm.style.background='#111827'; mm.innerHTML=`<img src="${t.dataset.img}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:inherit" alt="${p.title}">`; }
      }
    });
    t.addEventListener('keydown', e => { if (e.key==='Enter') t.click(); });
  });
  const overlay = document.getElementById('pdp-overlay');
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePdp() {
  const content = document.getElementById('pdp-content');
  if (content) {
    content.querySelectorAll('video').forEach(v => { try { v.pause(); v.src=''; v.load(); } catch(e){} });
    content.querySelectorAll('iframe').forEach(f => { try { f.src=''; } catch(e){} });
  }
  document.getElementById('pdp-overlay').classList.remove('open');
  document.getElementById('pdp-overlay').setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

document.addEventListener('DOMContentLoaded', () => {
  const user = MercaitechAuth.getUser();
  if (user) {
    document.getElementById('sidebar-avatar').textContent = initials(user.nombre);
    document.getElementById('sidebar-name').textContent   = user.nombre;
    document.getElementById('sidebar-email').textContent  = user.email;
  }
  renderWishlist(getWishlist());

  document.getElementById('pdp-close-btn').addEventListener('click', closePdp);
  document.getElementById('pdp-x-btn').addEventListener('click', closePdp);
  document.getElementById('pdp-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('pdp-overlay')) closePdp();
  });

  // Cart events
  document.getElementById('cart-btn').addEventListener('click', openCart);
  document.getElementById('close-cart-btn').addEventListener('click', closeCart);
  document.getElementById('cart-scrim').addEventListener('click', closeCart);
  document.getElementById('checkout-btn').addEventListener('click', () => { if (!window.cart.isEmpty) window.location.href = 'checkout.html'; });

  // Sync badge + re-render when cart changes (handles switchUser after verifySession)
  window.cart.onChange(() => {
    updateBadge();
    if (document.getElementById('cart-drawer').classList.contains('open')) renderCartUI();
  });
  updateBadge();

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('pdp-overlay').classList.contains('open')) closePdp();
      else closeCart();
    }
  });

  // Let search.js open PDP inline instead of navigating
  window._openProduct = id => openPdp(id);
  // Re-render after DB products load so images appear
  window._onProductsLoaded = () => renderWishlist(getWishlist());
});
</script>

<!-- PDP Modal -->
<div class="pdp-overlay" id="pdp-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Detalle de producto">
  <div class="pdp-modal" id="pdp-modal">
    <div class="pdp-modal__header">
      <button class="btn btn--secondary btn--sm" id="pdp-close-btn">← Volver a mis favoritos</button>
      <button class="icon-btn" id="pdp-x-btn" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="pdp-modal__body">
      <div id="pdp-content"></div>
    </div>
  </div>
</div>

<div class="search-overlay" id="search-overlay" role="search"><div class="search-box"><div class="search-box__input-wrap"><svg class="search-box__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="search" class="search-box__input" id="search-input" placeholder="Buscar productos, marcas, categorías..." aria-label="Buscar productos"><button class="search-box__close icon-btn icon-btn--danger" id="search-close-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div><div class="search-results" id="search-results"></div></div></div>
<script src="assets/js/search.js?v=10"></script>
