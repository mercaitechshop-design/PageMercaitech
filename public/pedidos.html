<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos — Mercaitech</title>
  <link rel="icon" type="image/png" href="assets/logo-mark.png">
  <!-- Preload crítico -->
  <link rel="preload" href="assets/fonts/Inter_18pt-Black.ttf" as="font" type="font/truetype" crossorigin>
  <link rel="preload" href="assets/css/tokens.css?v=3" as="style">
  <link rel="preload" href="assets/css/styles.css?v=4" as="style">
  <link rel="dns-prefetch" href="//api.mercadopago.com">
  <link rel="stylesheet" href="assets/css/tokens.css?v=3">
  <link rel="stylesheet" href="assets/css/styles.css?v=4">
  <style>
    #cancel-overlay {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(3,6,13,.82); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 20px;
    }
    #cancel-overlay.open { display: flex; }
    #cancel-box {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 36px 32px;
      width: 100%; max-width: 420px; position: relative;
      animation: cancelIn .22s cubic-bezier(.22,1,.36,1);
    }
    @keyframes cancelIn {
      from { opacity:0; transform: scale(.94) translateY(12px); }
      to   { opacity:1; transform: scale(1)  translateY(0);     }
    }
    .cancel-icon-wrap {
      width: 68px; height: 68px; border-radius: 50%;
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.28);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
    }
    .cancel-icon-wrap svg { width: 30px; height: 30px; color: #EF4444; }
    .cancel-btn-danger {
      width: 100%; padding: 13px; border-radius: var(--radius-md);
      background: #EF4444; color: #fff; border: none;
      font-family: inherit; font-size: 14px; font-weight: 700;
      letter-spacing: .04em; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .cancel-btn-danger:hover  { background: #dc2626; }
    .cancel-btn-danger:active { transform: scale(.98); }
    .cancel-btn-danger:disabled { opacity: .6; cursor: not-allowed; }
    .cancel-btn-secondary {
      width: 100%; padding: 13px; border-radius: var(--radius-md);
      background: transparent; color: var(--fg-muted);
      border: 1px solid var(--border);
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .cancel-btn-secondary:hover { border-color: var(--fg-subtle); color: var(--fg); }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="navbar__brand">
      <img src="assets/logo.png" alt="Mercaitech" class="navbar__logo">
    </a>
    <a href="index.html" class="btn btn--secondary btn--sm" style="margin-left:-4px;flex-shrink:0">← Volver a la tienda</a>
    <div style="flex:1"></div>
    <div class="navbar__actions">
      <button class="icon-btn" id="account-btn" aria-label="Mi cuenta">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="icon-btn" id="cart-btn" aria-label="Carrito" style="position:relative">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </button>
    </div>
  </div>
</nav>

<main class="account-page">
  <div class="container">
    <div class="account-layout">
      <aside class="account-sidebar">
        <div class="account-sidebar__header">
          <div class="account-sidebar__avatar" id="sidebar-avatar">?</div>
          <div class="account-sidebar__name" id="sidebar-name">—</div>
          <div class="account-sidebar__email" id="sidebar-email"></div>
        </div>
        <nav class="account-sidebar__nav">
          <a href="perfil.html" class="account-nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Mi perfil
          </a>
          <a href="pedidos.html" class="account-nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            Mis pedidos
          </a>
          <a href="favoritos.html" class="account-nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            Lista de deseos
          </a>
          <div style="height:1px;background:var(--border);margin:8px 0"></div>
          <button class="account-nav-item account-nav-item--danger" onclick="MercaitechAuth.logout()" style="width:100%;text-align:left">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            Cerrar sesión
          </button>
        </nav>
      </aside>

      <div class="account-panel">
        <h1 class="account-panel__title">Mis pedidos</h1>
        <div id="orders-container">
          <!-- Injected by JS -->
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Modal: confirmar anulación de pedido -->
<div id="cancel-overlay">
  <div id="cancel-box" role="dialog" aria-modal="true" aria-labelledby="cancel-title">

    <!-- Botón cerrar -->
    <button onclick="closeCancelModal()" aria-label="Cerrar"
      style="position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--fg-subtle);padding:6px;line-height:1;font-size:20px;transition:color .15s"
      onmouseover="this.style.color='var(--fg)'" onmouseout="this.style.color='var(--fg-subtle)'">✕</button>

    <!-- Ícono de advertencia -->
    <div class="cancel-icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>
      </svg>
    </div>

    <!-- Título -->
    <h3 id="cancel-title" style="font-size:20px;font-weight:800;text-align:center;margin:0 0 8px;letter-spacing:-.01em">
      ¿Anular este pedido?
    </h3>

    <!-- Número de orden -->
    <div id="cancel-order-ref"
      style="text-align:center;font-family:var(--font-mono);font-size:13px;color:var(--mt-cyan-400);margin-bottom:14px;letter-spacing:.05em"></div>

    <!-- Descripción -->
    <p style="text-align:center;font-size:13px;color:var(--fg-muted);line-height:1.65;margin:0 0 10px">
      El pedido quedará marcado como <strong style="color:#EF4444">cancelado</strong> y no podrás completar el pago.
    </p>
    <div style="display:flex;align-items:center;gap:8px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 14px;margin-bottom:28px">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" style="width:15px;height:15px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
      <span style="font-size:12px;color:var(--fg-muted)">Si ya realizaste el pago, contacta a soporte antes de anular.</span>
    </div>

    <!-- Acciones -->
    <div style="display:flex;flex-direction:column;gap:10px">
      <button id="cancel-confirm-btn" class="cancel-btn-danger" onclick="confirmCancelOrder()">
        Sí, anular pedido
      </button>
      <button class="cancel-btn-secondary" onclick="closeCancelModal()">
        Mantener pedido
      </button>
    </div>

  </div>
</div>

<!-- Cart drawer -->
<div class="cart-scrim" id="cart-scrim"></div>
<aside class="cart-drawer" id="cart-drawer" role="dialog" aria-label="Carrito de compras" aria-modal="true">
  <header class="cart-drawer__head">
    <h2 class="cart-drawer__title">Tu carrito <span class="text-subtle" id="cart-count-label">(0)</span></h2>
    <button class="icon-btn" id="close-cart-btn" aria-label="Cerrar carrito">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </header>
  <div class="cart-drawer__items" id="cart-items"></div>
  <footer class="cart-drawer__foot" id="cart-footer">
    <div class="cart-totals" id="cart-totals"></div>
    <button class="btn btn--primary btn--lg btn--full" id="checkout-btn" disabled>
      FINALIZAR COMPRA
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
  </footer>
</aside>

<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js?v=13"></script>
<script src="assets/js/auth.js?v=11"></script>
<script>
'use strict';
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

function initials(name) {
  return (name||'?').split(' ').filter(Boolean).slice(0,2).map(n=>n[0].toUpperCase()).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  const user = MercaitechAuth.getUser();
  const cont = document.getElementById('orders-container');

  if (!user) {
    cont.innerHTML = `
      <div class="account-empty">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/></svg>
        <div class="account-empty__title">Inicia sesión para ver tus pedidos</div>
        <a href="login.html" class="btn btn--primary">INICIAR SESIÓN</a>
      </div>`;
    return;
  }

  document.getElementById('sidebar-avatar').textContent = initials(user.nombre);
  document.getElementById('sidebar-name').textContent   = user.nombre;
  document.getElementById('sidebar-email').textContent  = user.email;

  // Try to load orders from API
  fetch('api/orders.php?usuario=' + encodeURIComponent(user.email))
    .then(r => r.json())
    .then(data => renderOrders(data.data || []))
    .catch(() => renderOrders([]));
});

const COP = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(parseFloat(n));

const STATUS_META = {
  pendiente:  { label:'Pendiente',  color:'#F59E0B', bg:'rgba(245,158,11,.1)',  border:'rgba(245,158,11,.25)',  icon:'⏳' },
  aprobado:   { label:'Aprobado',   color:'#10E896', bg:'rgba(16,232,150,.1)',  border:'rgba(16,232,150,.25)',  icon:'✓'  },
  pagado:     { label:'Pagado',     color:'#10E896', bg:'rgba(16,232,150,.1)',  border:'rgba(16,232,150,.25)',  icon:'✓'  },
  procesando: { label:'Procesando', color:'#3B82F6', bg:'rgba(59,130,246,.1)',  border:'rgba(59,130,246,.25)',  icon:'⚙'  },
  enviado:    { label:'Enviado',    color:'#1FD6FF', bg:'rgba(31,214,255,.1)',  border:'rgba(31,214,255,.25)',  icon:'🚚' },
  entregado:  { label:'Entregado',  color:'#2EE6A6', bg:'rgba(46,230,166,.1)',  border:'rgba(46,230,166,.25)',  icon:'📦' },
  cancelado:  { label:'Cancelado',  color:'#EF4444', bg:'rgba(239,68,68,.1)',   border:'rgba(239,68,68,.25)',   icon:'✕'  },
};

function formatDateTime(str) {
  const d = new Date(str);
  const date = d.toLocaleDateString('es-CO', { day:'numeric', month:'long', year:'numeric' });
  const time = d.toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit', hour12:true });
  return `${date} · ${time}`;
}

async function retryPayment(btn, ref) {
  btn.disabled = true;
  btn.textContent = 'Verificando…';
  try {
    const r = await fetch('api/mp_retry.php?ref=' + encodeURIComponent(ref), { credentials: 'same-origin' });
    const d = await r.json();
    if (d.already_paid) {
      // Pago ya existía → recargar para mostrar orden aprobada
      window.location.reload();
    } else if (d.success) {
      localStorage.setItem('mt_pending_checkout', JSON.stringify({ numero_orden: ref, email: '' }));
      window.location.href = d.sandbox_init_point || d.init_point;
    } else {
      btn.disabled = false;
      btn.textContent = 'Completar pago';
      alert('Error: ' + (d.error || 'No se pudo generar el pago'));
    }
  } catch {
    btn.disabled = false;
    btn.textContent = 'Completar pago';
  }
}

let _cancelRef = null;

function cancelOrder(btn, ref) {
  _cancelRef = ref;
  document.getElementById('cancel-order-ref').textContent = ref;
  const confirmBtn = document.getElementById('cancel-confirm-btn');
  confirmBtn.disabled    = false;
  confirmBtn.textContent = 'Sí, anular pedido';
  const overlay = document.getElementById('cancel-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCancelModal() {
  document.getElementById('cancel-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _cancelRef = null;
}

async function confirmCancelOrder() {
  if (!_cancelRef) return;
  const btn = document.getElementById('cancel-confirm-btn');
  btn.disabled    = true;
  btn.textContent = 'Anulando…';

  try {
    const r = await fetch('api/orders.php', {
      method: 'DELETE',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ numero_orden: _cancelRef }),
    });
    const d = await r.json();
    if (d.success) {
      closeCancelModal();
      window.location.reload();
    } else {
      btn.disabled    = false;
      btn.textContent = 'Sí, anular pedido';
      alert(d.error || 'No se pudo anular el pedido.');
    }
  } catch {
    btn.disabled    = false;
    btn.textContent = 'Sí, anular pedido';
  }
}

// Cerrar con Escape o clic en el fondo
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('cancel-overlay').classList.contains('open')) {
    closeCancelModal();
  }
});
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cancel-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('cancel-overlay')) closeCancelModal();
  });
});

function renderOrders(orders) {
  const cont = document.getElementById('orders-container');
  if (!orders || orders.length === 0) {
    cont.innerHTML = `
      <div class="account-empty">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <div class="account-empty__title">Aún no tienes pedidos</div>
        <p class="account-empty__sub">Cuando realices tu primera compra, podrás seguirla aquí.</p>
        <a href="productos.html" class="btn btn--primary">EXPLORAR PRODUCTOS</a>
      </div>`;
    return;
  }

  cont.innerHTML = orders.map((o, idx) => {
    const st    = STATUS_META[o.estado] || { label: o.estado, color:'#8593B2', bg:'rgba(133,147,178,.1)', border:'rgba(133,147,178,.25)', icon:'•' };
    const dt    = formatDateTime(o.creado_en);
    const addr  = [o.direccion_envio, o.ciudad, o.pais].filter(Boolean).join(', ');
    const isPending   = o.estado === 'pendiente';
    const isCancelled = o.estado === 'cancelado';

    const itemsHtml = (o.items || []).map(it => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <div style="width:6px;height:6px;border-radius:50%;background:${st.color};flex-shrink:0;opacity:.7"></div>
          <span style="font-size:13px;color:var(--fg);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.titulo || 'Producto'}</span>
        </div>
        <span style="font-size:12px;color:var(--fg-subtle);margin:0 14px;flex-shrink:0">×${it.cantidad}</span>
        <span style="font-size:13px;font-weight:700;color:var(--fg);flex-shrink:0">${COP(it.subtotal)}</span>
      </div>`).join('');

    const pendingBanner = isPending ? `
      <div style="margin:0 20px 16px;padding:14px 16px;border-radius:12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:#F59E0B;margin-bottom:3px">Pago pendiente</div>
          <div style="font-size:12px;color:var(--fg-muted)">Este pedido está reservado. Completa el pago para confirmarlo.</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap">
          <button onclick="retryPayment(this,'${o.numero_orden}')"
            style="padding:10px 20px;background:#F59E0B;color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:opacity .15s">
            Completar pago →
          </button>
          <button onclick="cancelOrder(this,'${o.numero_orden}')"
            style="padding:10px 18px;background:transparent;color:#EF4444;border:1px solid rgba(239,68,68,.35);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:all .15s">
            Anular pedido
          </button>
        </div>
      </div>` : '';

    return `
    <div style="position:relative;background:var(--bg-raised);border:1px solid ${isCancelled ? 'rgba(239,68,68,.2)' : isPending ? 'rgba(245,158,11,.2)' : 'var(--border)'};border-left:3px solid ${st.color};border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px;opacity:${isCancelled ? '.65' : '1'}">

      <!-- Header -->
      <div style="padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-subtle);font-weight:600">Pedido #${orders.length - idx}</span>
          </div>
          <div style="font-size:17px;font-weight:800;letter-spacing:.04em;color:var(--mt-cyan-400);font-family:var(--font-mono)">${o.numero_orden}</div>
          <div style="font-size:11px;color:var(--fg-subtle);margin-top:4px;display:flex;align-items:center;gap:5px">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;opacity:.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${dt}
          </div>
        </div>
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;background:${st.bg};border:1px solid ${st.border};color:${st.color};flex-shrink:0;white-space:nowrap">
          <span style="font-size:13px">${st.icon}</span>
          ${st.label}
        </span>
      </div>

      <!-- Pending banner -->
      ${pendingBanner}

      <!-- Productos -->
      ${itemsHtml ? `
      <div style="padding:14px 20px 0">
        <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg-subtle);margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:6px">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Productos
        </div>
        ${itemsHtml}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 20px 16px;gap:12px">
        <span style="font-size:12px;color:var(--fg-subtle)">Envío: <strong style="color:#10E896">Gratis</strong></span>
        <div style="text-align:right">
          <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--fg-subtle);margin-bottom:2px">Total</div>
          <div style="font-size:20px;font-weight:800;color:var(--fg)">${COP(o.total)}</div>
        </div>
      </div>` : ''}

      <!-- Dirección -->
      ${addr ? `
      <div style="border-top:1px solid rgba(255,255,255,.04);padding:12px 20px;display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,.02)">
        <div style="width:30px;height:30px;border-radius:8px;background:rgba(31,214,255,.08);border:1px solid rgba(31,214,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="var(--mt-cyan-400)" stroke-width="2" style="width:13px;height:13px"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div style="min-width:0">
          <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--fg-subtle);margin-bottom:4px;font-weight:600">Dirección de entrega</div>
          <div style="font-size:13px;font-weight:600;color:var(--fg)">${o.nombre_cliente || ''}</div>
          <div style="font-size:12px;color:var(--fg-muted);line-height:1.5">${addr}</div>
          ${o.telefono_cliente ? `<div style="font-size:12px;color:var(--fg-subtle)">📞 ${o.telefono_cliente}</div>` : ''}
        </div>
      </div>` : ''}

    </div>`;
  }).join('');
}
</script>

<!-- PDP Modal -->
<div class="pdp-overlay" id="pdp-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Detalle de producto">
  <div class="pdp-modal" id="pdp-modal">
    <div class="pdp-modal__header">
      <button class="btn btn--secondary btn--sm" id="pdp-close-btn">← Volver a mis pedidos</button>
      <button class="icon-btn" id="pdp-x-btn" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="pdp-modal__body"><div id="pdp-content"></div></div>
  </div>
</div>
<script>
'use strict';
(function pdpModule() {
  const _COP = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
  function _bvp(url) {
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
    const vi = url.match(/vimeo\.com\/(\d+)/);
    if (yt) return `<iframe src="https://www.youtube.com/embed/${yt[1]}?autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen style="position:absolute;inset:0;border-radius:inherit"></iframe>`;
    if (vi) return `<iframe src="https://player.vimeo.com/video/${vi[1]}?autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen style="position:absolute;inset:0;border-radius:inherit"></iframe>`;
    return `<video src="${url}" controls autoplay style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit"></video>`;
  }
  function _bvt(url) {
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
    const ov = `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:rgba(0,0,0,.32)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,.95)" style="width:26px;height:26px"><polygon points="5 3 19 12 5 21 5 3"/></svg><span style="font-size:9px;font-weight:700;color:rgba(255,255,255,.9);text-transform:uppercase">Video</span></div>`;
    if (yt) return `<div class="pdp-thumb" data-video="${url}" style="position:relative;background:#111;overflow:hidden;border-color:rgba(31,214,255,.35)" tabindex="0"><img src="https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" alt="Video" loading="lazy">${ov}</div>`;
    return `<div class="pdp-thumb" data-video="${url}" style="position:relative;background:#111;overflow:hidden;border-color:rgba(31,214,255,.35)" tabindex="0"><video src="${url}#t=0.5" muted preload="metadata" playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none"></video>${ov}</div>`;
  }
  let _qty = 1;
  window.openPdp = function(id) {
    const p = (window.PRODUCTS||[]).find(x => x.id === id) || (window.cart?.items||[]).find(x => x.id === id);
    if (!p) return;
    _qty = 1;
    const oos = window.isOutOfStock ? window.isOutOfStock(p) : false;
    const _imgs = Array.isArray(p.images) && p.images.length > 0 ? p.images : null;
    const _vids = Array.isArray(p.video_urls) && p.video_urls.length > 0 ? p.video_urls : (p.video_url ? [p.video_url] : []);
    const _vid = _vids[0] || null;
    const _main = _imgs ? _imgs[0].url : null;
    const _vt = _vids.map(v => _bvt(v)).join('');
    const bg = p.bg || '#0B1124';
    const ic = typeof window.getIcon === 'function' ? window.getIcon(p.icon) : '';
    document.getElementById('pdp-content').innerHTML = `
      <div class="pdp-grid">
        <div class="pdp-gallery">
          <div class="pdp-gallery__main" id="pdp-main-media" style="${_main?'background:#111827':_vid&&!_main?'background:#000':'background:'+bg}">
            ${_main||(_vid&&!_main)?'':'<div class="pdp-gallery__glow"></div>'}
            ${_vid&&!_main?_bvp(_vid):_main?`<img src="${_main}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:inherit" alt="${p.title}">`:ic?`<div class="pdp-gallery__icon">${ic}</div>`:''}
            ${p.badge?`<span class="product-card__badge badge--${p.badge.kind}" style="z-index:2;position:absolute;top:12px;left:12px">${p.badge.label}</span>`:''}
          </div>
          <div class="pdp-gallery__thumbs">
            ${_imgs?_imgs.map((img,i)=>`<div class="pdp-thumb ${i===0?'active':''}" data-img="${img.url}" style="background:#111827;overflow:hidden" tabindex="0"><img src="${img.url}" style="width:100%;height:100%;object-fit:cover" alt="${img.alt||p.title}"></div>`).join('')+_vt:_vid?_vt:[0,1,2,3].map(i=>`<div class="pdp-thumb ${i===0?'active':''}" style="background:${bg}" tabindex="0"><div style="width:32%;height:32%;color:rgba(255,255,255,.55)">${ic}</div></div>`).join('')}
          </div>
        </div>
        <div class="pdp-info">
          <span class="overline text-cyan">${p.categoryLabel||''}</span>
          <h2 class="pdp-info__title">${p.title}</h2>
          <div class="pdp-info__rating"><span class="pdp-info__rating-stars">★★★★${(p.rating||0)>=4.8?'★':'½'}</span><span>${p.rating||0} · ${(p.reviews||0).toLocaleString('es')} reseñas</span></div>
          <div class="pdp-info__prices">
            <span class="pdp-price-main">${_COP(p.price)}</span>
            ${p.oldPrice?`<span class="price-old">${_COP(p.oldPrice)}</span>`:''}
            ${p.oldPrice?`<span class="pdp-save">Ahorras ${_COP(p.oldPrice-p.price)}</span>`:''}
          </div>
          ${oos?`<div class="pdp-stock pdp-stock--oos"><span class="stock-dot stock-dot--oos"></span>Sin stock</div>`:`<div class="pdp-stock"><span class="stock-dot"></span>En stock · Envío en 24–48h</div>`}
          <p style="color:var(--fg-muted);font-size:14px;line-height:1.6">${p.description||''}</p>
          <div class="pdp-specs">${Object.entries(p.specs||{}).map(([k,v])=>`<div class="pdp-spec"><span class="pdp-spec-label">${k}</span><span class="pdp-spec-value">${v}</span></div>`).join('')}</div>
          ${!oos?`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <div class="pdp-qty">
              <button class="pdp-qty__btn" id="pdp-minus"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg></button>
              <span class="pdp-qty__val" id="pdp-qty-val">1</span>
              <button class="pdp-qty__btn" id="pdp-plus"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
            </div>
            <span style="font-size:12px;color:var(--fg-subtle)">Stock: ${typeof p.stock==='boolean'?'Disponible':p.stock+' unidades'}</span>
          </div>`:''}
          <div class="pdp-actions">
            <button class="btn btn--primary btn--lg" id="pdp-add-btn" ${oos?'disabled style="opacity:.45;cursor:not-allowed"':''}>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
              ${oos?'SIN STOCK':'AÑADIR AL CARRITO'}
            </button>
            <button class="btn btn--secondary btn--lg btn--icon" id="pdp-wish-btn" aria-label="Lista de deseos" title="Añadir a lista de deseos">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            </button>
          </div>
          <div class="pdp-trust">
            <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Compra segura</div>
            <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="13" x="4" y="7" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>Envío rápido</div>
            <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>30 días devolución</div>
          </div>
        </div>
      </div>`;
    document.getElementById('pdp-minus')?.addEventListener('click',()=>{if(_qty>1){_qty--;document.getElementById('pdp-qty-val').textContent=_qty;}});
    document.getElementById('pdp-plus')?.addEventListener('click',()=>{const _max=MercaitechCart.maxQty(p?.stock);if(_qty<_max){_qty++;document.getElementById('pdp-qty-val').textContent=_qty;}});
    document.getElementById('pdp-add-btn').addEventListener('click',()=>{
      if(oos)return;
      for(let i=0;i<_qty;i++) window.cart.add(p);
      window.closePdp();
      if (typeof window.openCart === 'function') window.openCart();
    });
    const _wishBtn = document.getElementById('pdp-wish-btn');
    if (_wishBtn) {
      const _wlKey = () => { try { const u=JSON.parse(localStorage.getItem('mt_user')||'null'); return u?.id?'mt_wishlist_u'+u.id:'mt_wishlist_guest'; } catch { return 'mt_wishlist_guest'; } };
      const _getWL = () => { try { return JSON.parse(localStorage.getItem(_wlKey())||'[]'); } catch { return []; } };
      const _syncWish = () => {
        const w = _getWL().some(i => i.id === p.id);
        _wishBtn.style.color = w ? '#FF5470' : '';
        _wishBtn.style.borderColor = w ? 'rgba(255,84,112,.5)' : '';
        _wishBtn.querySelector('svg').style.fill = w ? '#FF5470' : 'none';
        _wishBtn.title = w ? 'En tu lista de deseos' : 'Añadir a lista de deseos';
      };
      _syncWish();
      _wishBtn.addEventListener('click', () => {
        const list = _getWL();
        const idx = list.findIndex(i => i.id === p.id);
        if (idx >= 0) { list.splice(idx, 1); }
        else { const { image_url, images, video_url, video_urls, ...slim } = p; list.push(slim); }
        try { localStorage.setItem(_wlKey(), JSON.stringify(list)); } catch(e) { return; }
        _syncWish();
      });
    }
    document.getElementById('pdp-content').querySelectorAll('.pdp-thumb').forEach(t=>{
      t.addEventListener('click',()=>{
        document.getElementById('pdp-content').querySelectorAll('.pdp-thumb').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        const mm=document.getElementById('pdp-main-media');
        if(mm){
          mm.querySelectorAll('video').forEach(v=>{try{v.pause();v.src='';}catch(e){}});
          mm.querySelectorAll('iframe').forEach(f=>{try{f.src='';}catch(e){}});
          if(t.dataset.video){mm.style.background='#000';mm.innerHTML=_bvp(t.dataset.video);}
          else if(t.dataset.img){mm.style.background='#111827';mm.innerHTML=`<img src="${t.dataset.img}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:inherit" alt="${p.title}">`;}
        }
      });
    });
    const ov=document.getElementById('pdp-overlay');
    ov.classList.add('open');ov.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
  };
  window.closePdp = function() {
    const c=document.getElementById('pdp-content');
    if(c){c.querySelectorAll('video').forEach(v=>{try{v.pause();v.src='';v.load();}catch(e){}});c.querySelectorAll('iframe').forEach(f=>{try{f.src='';}catch(e){}});}
    const ov=document.getElementById('pdp-overlay');
    ov.classList.remove('open');ov.setAttribute('aria-hidden','true');
    document.body.style.overflow='';
  };
  window._openProduct = id => window.openPdp(id);
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('pdp-close-btn').addEventListener('click',window.closePdp);
    document.getElementById('pdp-x-btn').addEventListener('click',window.closePdp);
    document.getElementById('pdp-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('pdp-overlay'))window.closePdp();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('pdp-overlay').classList.contains('open'))window.closePdp();});
  });
})();
</script>

<div class="search-overlay" id="search-overlay" role="search"><div class="search-box"><div class="search-box__input-wrap"><svg class="search-box__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="search" class="search-box__input" id="search-input" placeholder="Buscar productos, marcas, categorías..." aria-label="Buscar productos"><button class="search-box__close icon-btn icon-btn--danger" id="search-close-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div><div class="search-results" id="search-results"></div></div></div>

<script>
'use strict';
(function initCart() {
  const COP = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
  function updateBadge() {
    const count = window.cart.count;
    const badge = document.getElementById('cart-badge');
    const label = document.getElementById('cart-count-label');
    if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
    if (label) label.textContent = '(' + count + ')';
  }
  function renderCartUI() {
    const items    = document.getElementById('cart-items');
    const totals   = document.getElementById('cart-totals');
    const checkout = document.getElementById('checkout-btn');
    updateBadge();
    if (window.cart.isEmpty) {
      items.innerHTML = '<div class="cart-empty"><div class="cart-empty__icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg></div><p class="cart-empty__title">Tu carrito está vacío</p><p class="cart-empty__sub">Descubre lo que tenemos para ti</p><a href="productos.html" class="btn btn--primary btn--sm"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explorar productos</a></div>';
      totals.innerHTML = ''; checkout.disabled = true; return;
    }
    items.innerHTML = window.cart.liveItems.map(item => {
      const full = (window.PRODUCTS||[]).find(p => p.id === item.id);
      const imageUrl = full?.image_url || item.image_url;
      const imgContent = imageUrl ? `<img src="${imageUrl}" alt="${item.title}">` : '';
      const imgBg = imageUrl ? 'background:#111827' : `background:${item.bg||'#0B1124'}`;
      const atMax = isFinite(MercaitechCart.maxQty(item.stock)) && item.qty >= MercaitechCart.maxQty(item.stock);
      return `<div class="cart-line" data-pid="${item.id}">
        <div class="cart-line__img" style="${imgBg};cursor:pointer" data-action="open">${imgContent}</div>
        <div class="cart-line__info">
          <div class="cart-line__name" style="cursor:pointer" data-action="open">${item.title}</div>
          <div class="cart-line__meta">${item.categoryLabel}</div>
          <div class="cart-line__bottom">
            <div class="cart-qty">
              <button class="cart-qty__btn" data-action="dec" aria-label="Reducir">−</button>
              <span class="cart-qty__val">${item.qty}</span>
              <button class="cart-qty__btn" data-action="inc" aria-label="Aumentar"${atMax?' disabled style="opacity:.4;cursor:not-allowed"':''}>+</button>
            </div>
            <div class="cart-line__price">${COP(item.price*item.qty)}</div>
          </div>
        </div>
        <button class="icon-btn" data-action="remove" aria-label="Eliminar" style="flex-shrink:0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>`;
    }).join('');
    items.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const line = el.closest('[data-pid]');
        const id = parseInt(line?.dataset.pid);
        if (!id) return;
        const action = el.dataset.action;
        if (action === 'open') { closeCart(); window.openPdp(id); }
        else if (action === 'remove') { window.cart.remove(id); renderCartUI(); }
        else if (action === 'dec') { const cur = window.cart.items.find(i=>i.id===id)?.qty||1; window.cart.setQty(id, cur-1); renderCartUI(); }
        else if (action === 'inc') { const cur = window.cart.items.find(i=>i.id===id)?.qty||1; window.cart.setQty(id, cur+1); renderCartUI(); }
      });
    });
    const sub = window.cart.subtotal;
    const iva = Math.round(sub * 0.19 / 1.19);
    totals.innerHTML = `
      <div class="cart-totals__row"><span>Subtotal</span><span>${COP(sub)}</span></div>
      <div class="cart-totals__row" style="font-size:11px;opacity:.6"><span>IVA incluido (19%)</span><span>${COP(iva)}</span></div>
      <div class="cart-totals__row"><span>Envío</span><span class="text-cyan">Gratis</span></div>
      <div class="cart-totals__row cart-totals__row--total"><span>Total</span><span>${COP(sub)}</span></div>`;
    checkout.disabled = false;
  }
  function openCart()  { renderCartUI(); document.getElementById('cart-drawer').classList.add('open'); document.getElementById('cart-scrim').classList.add('open'); document.body.style.overflow='hidden'; }
  function closeCart() { document.getElementById('cart-drawer').classList.remove('open'); document.getElementById('cart-scrim').classList.remove('open'); document.body.style.overflow=''; }
  window.openCart = openCart;
  document.addEventListener('DOMContentLoaded', () => {
    window.cart.onChange(() => { updateBadge(); if (document.getElementById('cart-drawer').classList.contains('open')) renderCartUI(); });
    updateBadge();
    document.getElementById('cart-btn').addEventListener('click', openCart);
    document.getElementById('close-cart-btn').addEventListener('click', closeCart);
    document.getElementById('cart-scrim').addEventListener('click', closeCart);
    document.getElementById('checkout-btn').addEventListener('click', () => { if (!window.cart.isEmpty) window.location.href='checkout.html'; });
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeCart(); });
  });
})();
</script>
</body>
