  <style>
    .products-page-wrap {
      padding-top: calc(var(--nav-h) + 40px);
      padding-bottom: 80px;
      min-height: 100vh;
    }
    .cat-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }
    .cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }
    .cat-pill svg { width: 14px; height: 14px; }
    .cat-pill:hover { border-color: var(--mt-blue-400); color: var(--fg); background: rgba(0,102,255,.06); }
    .cat-pill.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,102,255,.4);
    }
    .full-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .prod-count { font-size: 13px; color: var(--fg-subtle); margin-bottom: 16px; }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--fg-muted);
      grid-column: 1/-1;
    }
    .empty-state svg { width: 48px; height: 48px; color: var(--border-strong); display: block; margin: 0 auto 12px; }
  </style>
</head>

<script>
'use strict';

// ── Price formatter ────────────────────────────────────────────
const COP = n => new Intl.NumberFormat('es-CO', {
  style: 'currency', currency: 'COP',
  minimumFractionDigits: 0, maximumFractionDigits: 0
}).format(n);

// ── Cart state ────────────────────────────────────────────────
const myCart = window.cart || new MercaitechCart();
window.myCart = myCart;

function updateBadge() {
  const count = myCart.count;
  const badge = document.getElementById('cart-badge');
  const label = document.getElementById('cart-count-label');
  if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
  if (label) label.textContent = '(' + count + ')';
}

function renderCartUI() {
  const items    = document.getElementById('cart-items');
  const totals   = document.getElementById('cart-totals');
  const checkout = document.getElementById('checkout-btn');
  updateBadge();

  if (myCart.isEmpty) {
    items.innerHTML = '<div class="cart-empty"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg><p>Tu carrito está vacío</p></div>';
    totals.innerHTML = '';
    checkout.disabled = true;
    return;
  }

  items.innerHTML = myCart.items.map(item => {
    const full = (window.PRODUCTS||[]).find(p => p.id === item.id);
    const imageUrl = full?.image_url || item.image_url;
    const imgContent = imageUrl
      ? `<img src="${imageUrl}" alt="${item.title}">`
      : getIcon(item.icon);
    const imgBg = imageUrl ? 'background:#111827' : `background:${item.bg}`;
    return `
    <div class="cart-line" data-id="${item.id}">
      <div class="cart-line__img" style="${imgBg}">${imgContent}</div>
      <div class="cart-line__info">
        <div class="cart-line__name">${item.title}</div>
        <div class="cart-line__meta">${item.categoryLabel}</div>
        <div class="cart-line__bottom">
          <div class="cart-qty">
            <button class="cart-qty__btn" onclick="updateCartItem(${item.id},${item.qty - 1})" aria-label="Reducir">−</button>
            <span class="cart-qty__val">${item.qty}</span>
            <button class="cart-qty__btn" onclick="updateCartItem(${item.id},${item.qty + 1})" aria-label="Aumentar">+</button>
          </div>
          <div class="cart-line__price">${COP(item.price * item.qty)}</div>
        </div>
      </div>
      <button class="icon-btn" onclick="removeItem(${item.id})" aria-label="Eliminar" style="flex-shrink:0">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>`;
  }).join('');

  const sub = myCart.subtotal;
  const iva = Math.round(sub * 0.19 / 1.19); // IVA ya incluido en el precio
  totals.innerHTML = `
    <div class="cart-totals__row"><span>Subtotal</span><span>${COP(sub)}</span></div>
    <div class="cart-totals__row" style="font-size:11px;opacity:.6"><span>IVA incluido (19%)</span><span>${COP(iva)}</span></div>
    <div class="cart-totals__row"><span>Envío</span><span class="text-cyan">Gratis</span></div>
    <div class="cart-totals__row cart-totals__row--total"><span>Total</span><span>${COP(sub)}</span></div>`;
  checkout.disabled = false;
}

window.removeItem    = id      => { myCart.remove(id);       renderCartUI(); };
window.updateCartItem = (id, qty) => { myCart.setQty(id, qty); renderCartUI(); };

window.addToCart = function(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  if (window.isOutOfStock(p)) {
    showToast('Sin stock · Este producto no está disponible', 'error');
    return;
  }
  myCart.add(p);
  openCart();
};

// ── Cart drawer ────────────────────────────────────────────────
function openCart() {
  renderCartUI();  // Always refresh before showing (handles switchUser timing)
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-scrim').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCartDrawer() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-scrim').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Toast ──────────────────────────────────────────────────────
function showToast(msg) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast toast--success';
  el.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg><span>' + msg + '</span>';
  c.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 3000);
}

// ── Category filter ────────────────────────────────────────────
const CAT_NAMES = {
  todos: 'Todos los productos',
  tecnologia: 'Tecnología',
  hogar: 'Hogar',
  moda: 'Moda',
  deportes: 'Deportes',
  gaming: 'Gaming',
  belleza: 'Belleza'
};

function applyFilter(cat) {
  // Update URL hash
  if (cat === 'todos') {
    history.replaceState(null, '', location.pathname);
  } else {
    history.replaceState(null, '', '#' + cat);
  }

  // Update pill states
  document.querySelectorAll('.cat-pill').forEach(btn => {
    const btnCat = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
    btn.classList.toggle('is-active', btnCat === cat);
  });

  // Update heading
  document.getElementById('pg-title').textContent = CAT_NAMES[cat] || cat;
  document.getElementById('pg-overline').textContent = cat === 'todos' ? 'Catálogo completo' : 'Categoría';

  // Filter products
  const list = cat === 'todos' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
  document.getElementById('prod-count').textContent = list.length + ' producto' + (list.length === 1 ? '' : 's');

  const grid = document.getElementById('full-grid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>Sin productos en esta categoría.</p></div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const wished = isWished(p.id);
    const oos    = window.isOutOfStock(p);
    const mediaBg = p.image_url ? 'background:#111827' : 'background:' + p.bg;
    const mediaInner = p.image_url
      ? `<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover" alt="${p.title}">`
      : `<div class="product-card__icon">${getIcon(p.icon)}</div>`;
    return `<div class="product-card${oos ? ' product-card--oos' : ''}" role="listitem">
      <div class="product-card__media" style="${mediaBg};cursor:pointer" onclick="openPdp(${p.id})">
        <div class="product-card__media-inner">
          ${mediaInner}
        </div>
        ${p.badge ? `<span class="product-card__badge badge--${p.badge.kind}">${p.badge.label}</span>` : ''}
        ${oos ? '<div class="product-card__oos">Sin stock</div>' : ''}
        <button class="product-card__wish${wished ? ' active' : ''}"
                onclick="toggleWish(event,${p.id})" aria-label="Lista de deseos">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${wished ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </button>
      </div>
      <div class="product-card__body">
        <span class="product-card__cat">${p.categoryLabel}</span>
        <div class="product-card__title">${p.title}</div>
        <div class="product-card__row">
          <div class="product-card__prices">
            <span class="price-new">${COP(p.price)}</span>
            ${p.oldPrice ? `<span class="price-old">${COP(p.oldPrice)}</span>` : ''}
          </div>
          <button class="add-btn" onclick="addToCart(${p.id})" aria-label="${oos ? 'Sin stock' : 'Añadir al carrito'}" ${oos ? 'disabled' : ''}>
            <svg class="add-btn__cart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            <span class="add-btn__plus">+</span>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Wishlist (per-user key) ────────────────────────────────────
function getWLKey() { try { const u=JSON.parse(localStorage.getItem('mt_user')||'null'); return u?.id?'mt_wishlist_u'+u.id:'mt_wishlist_guest'; } catch { return 'mt_wishlist_guest'; } }
function getWL() { try { return JSON.parse(localStorage.getItem(getWLKey()) || '[]'); } catch { return []; } }
function isWished(id) { return getWL().some(i => i.id === id); }
function toggleWish(e, id) {
  e.stopPropagation();
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  let list = getWL();
  const idx = list.findIndex(i => i.id === id);
  if (idx >= 0) { list.splice(idx, 1); showToast('Eliminado de favoritos'); }
  else {
    const { image_url, images, video_url, video_urls, ...slim } = p;
    list.push(slim);
    showToast(p.title + ' guardado en favoritos');
  }
  try { localStorage.setItem(getWLKey(), JSON.stringify(list)); }
  catch(err) { showToast('Error al guardar favoritos (almacenamiento lleno)'); return; }
  const activeCat = document.querySelector('.cat-pill.is-active')?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || 'todos';
  applyFilter(activeCat);
}

// ── Navbar dropdown toggle ─────────────────────────────────────
function navFilter(cat) {
  document.getElementById('cat-dropdown').classList.remove('open');
  document.getElementById('cat-dropdown-btn').setAttribute('aria-expanded', 'false');
  applyFilter(cat);
  return false; // prevent default link navigation
}

// ── Init ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Navbar scroll
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
  }, { passive: true });

  // Auth
  MercaitechAuth.initNavbar();

  // Cart events
  document.getElementById('cart-btn').addEventListener('click', openCart);
  document.getElementById('close-cart-btn').addEventListener('click', closeCartDrawer);
  document.getElementById('cart-scrim').addEventListener('click', closeCartDrawer);
  document.getElementById('checkout-btn').addEventListener('click', () => {
    if (!myCart.isEmpty) window.location.href = 'checkout.html';
  });
  // Sync badge whenever cart changes (handles switchUser after verifySession)
  myCart.onChange(() => {
    updateBadge();
    if (document.getElementById('cart-drawer').classList.contains('open')) renderCartUI();
  });
  renderCartUI();

  // Dropdowns
  const catBtn  = document.getElementById('cat-dropdown-btn');
  const catMenu = document.getElementById('cat-dropdown');
  const svcBtn  = document.getElementById('svc-dropdown-btn');
  const svcMenu = document.getElementById('svc-dropdown');

  catBtn.addEventListener('click', e => {
    e.stopPropagation();
    svcMenu.classList.remove('open'); svcBtn.setAttribute('aria-expanded','false');
    const o = catMenu.classList.toggle('open');
    catBtn.setAttribute('aria-expanded', o);
  });
  svcBtn.addEventListener('click', e => {
    e.stopPropagation();
    catMenu.classList.remove('open'); catBtn.setAttribute('aria-expanded','false');
    const o = svcMenu.classList.toggle('open');
    svcBtn.setAttribute('aria-expanded', o);
  });
  document.addEventListener('click', () => {
    catMenu.classList.remove('open'); catBtn.setAttribute('aria-expanded','false');
    svcMenu.classList.remove('open'); svcBtn.setAttribute('aria-expanded','false');
  });

  // Mobile menu
  const mobileBtn  = document.getElementById('mobile-menu-btn');
  mobileBtn?.addEventListener('click', () => {
    const open = document.getElementById('cat-dropdown').classList.toggle('open');
    mobileBtn.setAttribute('aria-expanded', open);
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (!document.getElementById('pdp-overlay').classList.contains('open')) closeCartDrawer();
      else closePdp();
    }
  });

  // Read hash and apply initial filter
  const hash = window.location.hash.replace('#', '').toLowerCase();
  const valid = ['tecnologia','hogar','moda','deportes','gaming','belleza'];
  applyFilter(valid.includes(hash) ? hash : 'todos');

  // Handle ?product=ID (from search or wishlist links)
  const _productParam = new URLSearchParams(window.location.search).get('product');
  if (_productParam) setTimeout(() => openPdp(parseInt(_productParam)), 300);

  // Let search.js open PDP inline instead of navigating
  window._openProduct = id => openPdp(id);

  // Re-render when DB products finish loading
  window._onProductsLoaded = function() {
    const activeCat = document.querySelector('.cat-pill.is-active')
      ?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || 'todos';
    applyFilter(activeCat);
    // Retry ?product= open after DB data arrives
    if (_productParam && !document.getElementById('pdp-overlay')?.classList.contains('open')) {
      setTimeout(() => openPdp(parseInt(_productParam)), 100);
    }
  };
});
</script>

<script>
// ── PDP Modal para productos.html ──────────────────────────────────
function buildVideoPlayer(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  const vi = url.match(/vimeo\.com\/(\d+)/);
  if (yt) return `<iframe src="https://www.youtube.com/embed/${yt[1]}?autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen style="position:absolute;inset:0;border-radius:inherit"></iframe>`;
  if (vi) return `<iframe src="https://player.vimeo.com/video/${vi[1]}?autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen style="position:absolute;inset:0;border-radius:inherit"></iframe>`;
  return `<video src="${url}" controls autoplay style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit"></video>`;
}

function buildVideoThumb(url) {
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  const vi = url.match(/vimeo\.com\/(\d+)/);
  const overlay = `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:rgba(0,0,0,.32)">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,.95)" style="width:26px;height:26px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7))"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <span style="font-size:9px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.06em;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.8)">Video</span>
  </div>`;
  if (yt) {
    return `<div class="pdp-thumb" data-video="${url}" style="position:relative;background:#111;overflow:hidden;border-color:rgba(31,214,255,.35)" tabindex="0" title="Ver video">
      <img src="https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" alt="Video" loading="lazy">
      ${overlay}
    </div>`;
  }
  if (vi) {
    return `<div class="pdp-thumb" data-video="${url}" style="position:relative;background:#0d1220;overflow:hidden;border-color:rgba(31,214,255,.35)" tabindex="0" title="Ver video">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(31,214,255,.9)" style="width:22px;height:22px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span style="font-size:9px;font-weight:700;color:rgba(31,214,255,.7);letter-spacing:.06em;text-transform:uppercase">Video</span>
      </div>
    </div>`;
  }
  return `<div class="pdp-thumb" data-video="${url}" style="position:relative;background:#111;overflow:hidden;border-color:rgba(31,214,255,.35)" tabindex="0" title="Ver video">
    <video src="${url}#t=0.5" muted preload="metadata" playsinline onloadedmetadata="this.currentTime=0.5"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none"></video>
    ${overlay}
  </div>`;
}
let _pdpProduct = null;
let _pdpQty = 1;

function openPdp(id) {
  const p = (window.PRODUCTS || []).find(p => p.id === id);
  if (!p) return;
  _pdpProduct = p;
  _pdpQty = 1;

  const _imgs    = Array.isArray(p.images) && p.images.length > 0 ? p.images : null;
  const _vids    = Array.isArray(p.video_urls) && p.video_urls.length > 0
    ? p.video_urls
    : (p.video_url ? [p.video_url] : []);
  const _vid     = _vids[0] || null;
  const _mainSrc = _imgs ? _imgs[0].url : null;
  const _vidThumbs = _vids.map(v => buildVideoThumb(v)).join('');
  document.getElementById('pdp-content').innerHTML = `
    <div class="pdp-grid">
      <div class="pdp-gallery">
        <div class="pdp-gallery__main" id="pdp-main-media" style="${_mainSrc ? 'background:#111827' : _vid && !_mainSrc ? 'background:#000' : 'background:'+p.bg}">
          ${_mainSrc || (_vid && !_mainSrc) ? '' : '<div class="pdp-gallery__glow"></div>'}
          ${_vid && !_mainSrc
            ? buildVideoPlayer(_vid)
            : _mainSrc
              ? `<img id="pdp-main-img" src="${_mainSrc}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:inherit" alt="${p.title}">`
              : `<div class="pdp-gallery__icon">${window.getIcon(p.icon)}</div>`}
          ${p.badge ? `<span class="product-card__badge badge--${p.badge.kind}" style="z-index:2;position:absolute;top:12px;left:12px">${p.badge.label}</span>` : ''}
        </div>
        <div class="pdp-gallery__thumbs">
          ${_imgs
            ? _imgs.map((img, i) => `<div class="pdp-thumb ${i===0?'active':''}" data-img="${img.url}" style="background:#111827;overflow:hidden" tabindex="0"><img src="${img.url}" style="width:100%;height:100%;object-fit:cover" alt="${img.alt||p.title}"></div>`).join('') + _vidThumbs
            : _vid
              ? _vidThumbs
              : [0,1,2,3].map(i => `<div class="pdp-thumb ${i===0?'active':''}" style="background:${p.bg}" tabindex="0"><div style="width:32%;height:32%;color:rgba(255,255,255,.55)">${window.getIcon(p.icon)}</div></div>`).join('')
          }
        </div>
      </div>
      <div class="pdp-info">
        <span class="overline text-cyan">${p.categoryLabel}</span>
        <h2 class="pdp-info__title">${p.title}</h2>
        <div class="pdp-info__rating">
          <span class="pdp-info__rating-stars">★★★★${p.rating >= 4.8 ? '★' : '½'}</span>
          <span>${p.rating} · ${p.reviews.toLocaleString('es')} reseñas</span>
        </div>
        <div class="pdp-info__prices">
          <span class="pdp-price-main">${COP(p.price)}</span>
          ${p.oldPrice ? `<span class="price-old">${COP(p.oldPrice)}</span>` : ''}
          ${p.oldPrice ? `<span class="pdp-save">Ahorras ${COP(p.oldPrice - p.price)}</span>` : ''}
        </div>
        ${window.isOutOfStock(p)
          ? `<div class="pdp-stock pdp-stock--oos"><span class="stock-dot stock-dot--oos"></span>Sin stock · No disponible actualmente</div>`
          : `<div class="pdp-stock"><span class="stock-dot"></span>En stock · Envío en 24–48h</div>`}
        <p style="color:var(--fg-muted);font-size:14px;line-height:1.6">${p.description}</p>
        <div class="pdp-specs">
          ${Object.entries(p.specs || {}).map(([k,v]) => `
            <div class="pdp-spec">
              <span class="pdp-spec-label">${k}</span>
              <span class="pdp-spec-value">${v}</span>
            </div>`).join('')}
        </div>
        ${!window.isOutOfStock(p) ? `
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="pdp-qty">
            <button class="pdp-qty__btn" id="pdp-minus">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
            </button>
            <span class="pdp-qty__val" id="pdp-qty-val">1</span>
            <button class="pdp-qty__btn" id="pdp-plus">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
          </div>
          <span style="font-size:12px;color:var(--fg-subtle)">Stock: ${typeof p.stock === 'boolean' ? 'Disponible' : p.stock + ' unidades'}</span>
        </div>` : ''}
        <div class="pdp-actions">
          <button class="btn btn--primary btn--lg" id="pdp-add-btn" ${window.isOutOfStock(p) ? 'disabled style="opacity:.45;cursor:not-allowed"' : ''}>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            ${window.isOutOfStock(p) ? 'SIN STOCK' : 'AÑADIR AL CARRITO'}
          </button>
          <button class="btn btn--secondary btn--lg btn--icon" id="pdp-wish-btn" aria-label="Favoritos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </button>
        </div>
        <div class="pdp-trust">
          <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Compra segura</div>
          <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="13" x="4" y="7" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>Envío rápido</div>
          <div class="pdp-trust__item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>30 días devolución</div>
        </div>
      </div>
    </div>`;

  // Qty controls (only rendered when in stock)
  document.getElementById('pdp-minus')?.addEventListener('click', () => {
    if (_pdpQty > 1) { _pdpQty--; document.getElementById('pdp-qty-val').textContent = _pdpQty; }
  });
  document.getElementById('pdp-plus')?.addEventListener('click', () => {
    _pdpQty++; document.getElementById('pdp-qty-val').textContent = _pdpQty;
  });

  // Add to cart
  document.getElementById('pdp-add-btn').addEventListener('click', () => {
    if (window.isOutOfStock(_pdpProduct)) return;
    for (let i = 0; i < _pdpQty; i++) myCart.add(_pdpProduct);
    closePdp();
    openCart();
  });

  // Wishlist (per-user key)
  const wishBtn = document.getElementById('pdp-wish-btn');
  const _getWL  = () => { try { return JSON.parse(localStorage.getItem(getWLKey()) || '[]'); } catch { return []; } };
  const syncWish = () => {
    const wished = _getWL().some(i => i.id === p.id);
    wishBtn.style.color = wished ? '#FF5470' : '';
    wishBtn.style.borderColor = wished ? 'rgba(255,84,112,.5)' : '';
    wishBtn.querySelector('svg').style.fill = wished ? '#FF5470' : 'none';
  };
  syncWish();
  wishBtn.addEventListener('click', () => {
    const list = _getWL();
    const idx  = list.findIndex(i => i.id === p.id);
    if (idx >= 0) { list.splice(idx, 1); showToast('Eliminado de favoritos'); }
    else {
      const { image_url, images, video_url, video_urls, ...slim } = p;
      list.push(slim);
      showToast('Añadido a favoritos ♥');
    }
    try { localStorage.setItem(getWLKey(), JSON.stringify(list)); }
    catch(err) { showToast('Error al guardar favoritos (almacenamiento lleno)'); return; }
    syncWish();
  });

  // Thumbs — switch between images and video
  document.getElementById('pdp-content').querySelectorAll('.pdp-thumb').forEach(t => {
    t.addEventListener('click', () => {
      document.getElementById('pdp-content').querySelectorAll('.pdp-thumb').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const mainMedia = document.getElementById('pdp-main-media');
      // Stop current media before switching
      if (mainMedia) {
        mainMedia.querySelectorAll('video').forEach(v => { try { v.pause(); v.src = ''; } catch(e){} });
        mainMedia.querySelectorAll('iframe').forEach(f => { try { f.src = ''; } catch(e){} });
      }
      if (t.dataset.video) {
        if (mainMedia) {
          mainMedia.style.background = '#000';
          mainMedia.innerHTML = buildVideoPlayer(t.dataset.video);
        }
      } else if (t.dataset.img) {
        if (mainMedia) {
          mainMedia.style.background = '#111827';
          mainMedia.innerHTML = `<img id="pdp-main-img" src="${t.dataset.img}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:inherit" alt="${p.title}">`;
        }
      }
    });
  });

  const overlay = document.getElementById('pdp-overlay');
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePdp() {
  // Stop any playing video or embedded iframe
  const content = document.getElementById('pdp-content');
  if (content) {
    content.querySelectorAll('video').forEach(v => { try { v.pause(); v.src = ''; v.load(); } catch(e){} });
    content.querySelectorAll('iframe').forEach(f => { try { f.src = ''; } catch(e){} });
  }
  const overlay = document.getElementById('pdp-overlay');
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pdp-close-btn').addEventListener('click', closePdp);
  document.getElementById('pdp-x-btn').addEventListener('click', closePdp);
  document.getElementById('pdp-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('pdp-overlay')) closePdp();
  });
});
</script>
</body>
</html>
