<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — Mercaitech</title>
  <link rel="icon" type="image/png" href="assets/logo-mark.png">
  <link rel="preload" href="fonts/Inter_18pt-Black.ttf" as="font" type="font/truetype">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .reset-card {
      background:var(--mt-ink-900); border:1px solid var(--border-strong);
      border-radius:20px; padding:40px; width:100%; max-width:420px;
      text-align:center; position:relative; overflow:hidden;
    }
    .reset-glow {
      position:absolute; top:-50px; left:50%; transform:translateX(-50%);
      width:280px; height:180px;
      background:radial-gradient(circle, rgba(0,102,255,.25), transparent 70%);
      pointer-events:none;
    }
    .reset-icon {
      width:60px; height:60px; border-radius:16px; margin:0 auto 20px;
      background:rgba(0,102,255,.14); border:1px solid rgba(0,102,255,.35);
      color:var(--mt-blue-300); display:flex; align-items:center; justify-content:center;
      position:relative;
    }
    .reset-icon svg { width:26px; height:26px; }
    h1 { font-family:var(--font-display); font-weight:800; font-size:22px; letter-spacing:-0.02em; color:var(--fg); margin-bottom:8px; position:relative; }
    p  { font-size:14px; color:var(--fg-muted); line-height:1.6; margin-bottom:24px; position:relative; }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; text-align:left; }
    .field label { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-muted); }
    .field input {
      background:var(--mt-ink-800); border:1.5px solid var(--border); border-radius:10px;
      padding:13px 16px; color:var(--fg); font-family:inherit; font-size:14px; outline:none;
      transition:border-color .2s;
    }
    .field input:focus { border-color:var(--mt-blue-400); box-shadow:0 0 0 3px rgba(0,102,255,.15); }
    .field input::placeholder { color:var(--fg-subtle); }
    .pwd-row { display:flex; flex-direction:column; gap:6px; }
    .error-msg { font-size:12px; color:#FF5470; margin-bottom:10px; display:none; }
    .error-msg.show { display:block; }
    .btn-reset {
      width:100%; padding:14px; border-radius:10px; border:0;
      background:var(--accent); color:#fff; font-family:inherit;
      font-size:13px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
      transition:all .22s; box-shadow:0 6px 18px rgba(0,102,255,.35);
    }
    .btn-reset:hover { background:var(--accent-hover); transform:translateY(-1px); }
    .btn-reset:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .success-state { display:none; flex-direction:column; align-items:center; gap:12px; }
    .success-state.show { display:flex; }
    .success-check {
      width:64px; height:64px; border-radius:50%;
      background:rgba(16,201,138,.12); border:1px solid rgba(16,201,138,.4);
      color:var(--mt-green-400); display:flex; align-items:center; justify-content:center;
    }
    .success-check svg { width:32px; height:32px; }
    .form-state { position:relative; }
    .spinner {
      display:none; width:16px; height:16px;
      border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div class="reset-card">
  <div class="reset-glow"></div>

  <div id="form-state" class="form-state">
    <div class="reset-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Nueva contraseña</h1>
    <p>Elige una contraseña segura de al menos 8 caracteres.</p>

    <div id="token-error" style="background:rgba(255,84,112,.08);border:1px solid rgba(255,84,112,.3);border-radius:10px;padding:12px;font-size:13px;color:#FF5470;margin-bottom:16px;display:none">
      El enlace es inválido o ha expirado. <a href="login.html" style="color:var(--mt-blue-300)">Solicita uno nuevo →</a>
    </div>

    <form id="reset-form" onsubmit="submitReset(event)">
      <div class="field">
        <label for="new-pwd">Nueva contraseña</label>
        <input type="password" id="new-pwd" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="confirm-pwd">Confirmar contraseña</label>
        <input type="password" id="confirm-pwd" placeholder="Repite la contraseña" autocomplete="new-password" required>
      </div>
      <div class="error-msg" id="reset-error"></div>
      <button type="submit" class="btn-reset" id="reset-btn">
        <span class="btn-label">GUARDAR CONTRASEÑA</span>
        <div class="spinner" id="reset-spinner"></div>
      </button>
    </form>
  </div>

  <div class="success-state" id="success-state">
    <div class="success-check">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1 style="margin-bottom:4px">¡Contraseña actualizada!</h1>
    <p style="margin-bottom:8px">Ya puedes iniciar sesión con tu nueva contraseña.</p>
    <a href="login.html" class="btn-reset" style="text-decoration:none;width:auto;padding:13px 28px">IR AL LOGIN</a>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('token') || '';
const verify = params.get('verify') || '';

// Handle email verification (different from password reset)
if (verify && !token) {
  fetch('api/auth.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'verify', token: verify })
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('success-state').classList.add('show');
    document.querySelector('.success-state p').textContent =
      '¡Tu correo ha sido verificado! Ya puedes iniciar sesión.';
  })
  .catch(() => {});
}

// Validate token on load
if (token) {
  fetch('api/auth.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'validate_reset_token', token })
  })
  .then(r => r.json())
  .then(data => {
    if (!data.success) {
      document.getElementById('token-error').style.display = 'block';
      document.getElementById('reset-form').style.display  = 'none';
    }
  })
  .catch(() => { /* offline — let user try anyway */ });
} else if (!verify) {
  document.getElementById('token-error').style.display = 'block';
  document.getElementById('reset-form').style.display  = 'none';
}

async function submitReset(e) {
  e.preventDefault();
  const pwd     = document.getElementById('new-pwd').value;
  const confirm = document.getElementById('confirm-pwd').value;
  const errEl   = document.getElementById('reset-error');
  const btn     = document.getElementById('reset-btn');

  errEl.classList.remove('show');

  if (pwd.length < 8) { errEl.textContent = 'Mínimo 8 caracteres.'; errEl.classList.add('show'); return; }
  if (pwd !== confirm) { errEl.textContent = 'Las contraseñas no coinciden.'; errEl.classList.add('show'); return; }

  btn.disabled = true;
  document.querySelector('.btn-label').style.display = 'none';
  document.getElementById('reset-spinner').style.display = 'block';

  try {
    const res  = await fetch('api/auth.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset', token, password: pwd })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').classList.add('show');
    } else {
      errEl.textContent = data.message || 'Error al actualizar. El enlace puede haber expirado.';
      errEl.classList.add('show');
      btn.disabled = false;
      document.querySelector('.btn-label').style.display = '';
      document.getElementById('reset-spinner').style.display = 'none';
    }
  } catch {
    errEl.textContent = 'Error de conexión. Inténtalo de nuevo.';
    errEl.classList.add('show');
    btn.disabled = false;
    document.querySelector('.btn-label').style.display = '';
    document.getElementById('reset-spinner').style.display = 'none';
  }
}
</script>
</body>
</html>
