# ============================================================
#  Apache VirtualHost — Mercaitech
#  Para instalar:
#    sudo cp mercaitech-apache.conf /etc/apache2/sites-available/mercaitech.conf
#    sudo a2ensite mercaitech
#    sudo a2enmod rewrite
#    sudo systemctl restart apache2
#
#  Acceso: http://mercaitech.local (añade al /etc/hosts: 127.0.0.1 mercaitech.local)
#  O simplemente: http://localhost/mercaitech/
# ============================================================

<VirtualHost *:80>
    ServerName mercaitech.local
    DocumentRoot /home/darknightl16/Desktop/Prototipo

    <Directory /home/darknightl16/Desktop/Prototipo>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/mercaitech_error.log
    CustomLog ${APACHE_LOG_DIR}/mercaitech_access.log combined
</VirtualHost>
